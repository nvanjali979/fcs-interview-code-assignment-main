# ---------------------------------------------------------------------------
# Datasource (production only – dev/test use the embedded H2 via Quarkus Dev)
# ---------------------------------------------------------------------------
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=quarkus_test
%prod.quarkus.datasource.password=quarkus_test
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/quarkus_test
%prod.quarkus.datasource.jdbc.max-size=8
%prod.quarkus.datasource.jdbc.min-size=2

# ---------------------------------------------------------------------------
# ORM
# ---------------------------------------------------------------------------
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

# ---------------------------------------------------------------------------
# OpenAPI code generation
# ---------------------------------------------------------------------------
quarkus.openapi.generator.spec=warehouse-openapi.yaml
quarkus.openapi.generator.base-package=com.warehouse.api

# ---------------------------------------------------------------------------
# Health checks  (quarkus-smallrye-health)
#   GET /q/health       – combined liveness + readiness
#   GET /q/health/live  – liveness only
#   GET /q/health/ready – readiness only
# ---------------------------------------------------------------------------
# Keep health endpoints on the management port (9000) in prod so they are
# never exposed on the public-facing port.
%prod.quarkus.management.enabled=true
%prod.quarkus.management.port=9000

# Include the datasource connectivity check that Quarkus auto-generates for
# Hibernate datasources in the readiness group.
quarkus.datasource.health.enabled=true