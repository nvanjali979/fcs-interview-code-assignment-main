# ---------------------------------------------------------------------------
# CI / CD Pipeline
#
# Triggers
#   • Every push to main
#   • Every pull request targeting main
#
# Jobs
#   1. build-and-test  – compiles, runs unit tests, produces the JAR
#   2. docker-build    – builds the Docker image (runs on main only, after
#                        build-and-test passes; no push until a registry is
#                        configured)
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    working-directory: java-assignment   # all run steps execute inside the Maven module

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Run test
      - name: Build and run tests
        run: ./mvnw verify --batch-mode --no-transfer-progress

      # Archive the test report so it is downloadable from the Actions UI
      - name: Upload test results
        if: always()           # upload even when tests fail so failures are visible
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: java-assignment/target/surefire-reports/
          retention-days: 7

      # Archive the application JAR for downstream jobs
      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: java-assignment/target/quarkus-app/
          retention-days: 1

  #
  # Job 2 – Docker image build (main branch only)
  #
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: java-assignment/target/quarkus-app/

      
      - name: Build Docker image
        run: |
          docker build \
            -f src/main/docker/Dockerfile.jvm \
            -t fcs-warehouse-app:${{ github.sha }} \
            -t fcs-warehouse-app:latest \
            .
